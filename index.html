<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>StudyMate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="anaMenu" class="gizli">
        <h1>StudyMate</h1>
        <nav>
            <button onclick="sayfaGoster('planlamaSayfasi')">Görev Takvimi</button>
            <button onclick="cikisYap()">Çıkış Yap</button>
        </nav>
    </header>

    <main>
        <section id="girisSayfasi">
            <h2>StudyMate'e Hoş Geldiniz</h2>
            <p>Derslerinizi ve görevlerinizi akıllı takvim ile takip edin.</p>
            <form id="girisFormu">
                <input type="text" id="kullaniciAdi" placeholder="İsminiz" required>
                <input type="email" id="kullaniciEposta" placeholder="E-posta Adresiniz" required>
                <button type="submit">Giriş Yap</button>
            </form>
        </section>

        <section id="planlamaSayfasi" class="gizli">
            <div class="takvim-bari" onclick="takvimiAcKapat()">
                <div class="takvim-sol">Takvim</div>
                <div class="takvim-orta" id="tarihYazisi">Tarih Yükleniyor...</div>
                <div class="takvim-sag">
                    <span id="saatYazisi">Saat</span>
                    <span id="takvimOku">▼</span>
                </div>
            </div>

            <div id="takvimIcerik" class="gizli-takvim">
                <div class="ay-degistirici">
                    <button class="ok-butonu" onclick="ayDegistir(-1)">&#9664; Önceki Ay</button>
                    <h3 id="gosterilenAyYazisi">Ay Yükleniyor...</h3>
                    <button class="ok-butonu" onclick="ayDegistir(1)">Sonraki Ay &#9654;</button>
                </div>

                <div id="haftaninGunleri">
                    <div>Pt</div><div>Sa</div><div>Ça</div><div>Pe</div><div>Cu</div><div>Ct</div><div>Pa</div>
                </div>
                <div id="takvimIzgarasi"></div>
            </div>

            <div class="takvim-alti-kutu">
                <h3>Tüm Görevler ve Notlar</h3>
                <div id="takvimAltiGorevler">
                    <p>Henüz bir plan eklenmedi.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- YENİ MİMARİ: Eski adı gorevBaloncugu olan yapıyı artık Modal ekranı olarak kullanıyoruz -->
    <div id="gorevBaloncugu" class="gizli-tamamen">
        
        <!-- YENİ: Ortada açılan beyaz içerik kutusu -->
        <div class="modal-icerik">
            
            <!-- Çarpı butonu olan şık bir başlık -->
            <div class="modal-baslik">
                <h3 id="modalBaslikYazisi">Görevler</h3>
                <button class="modal-kapat-btn" onclick="baloncuguKapat()">✖</button>
            </div>

            <div id="baloncukMevcutGorevler"></div>
            <button id="baloncukYeniGorevBtn" onclick="yeniGorevFormunuAc()" class="btn-yeni-ekle gizli">Yeni Görev Ekle</button>
            
            <div id="baloncukFormAlani">
                <input type="text" id="baloncukKonu" placeholder="Konu veya Ders İsmi">
                <textarea id="baloncukIcerik" placeholder="Konunun açıklamasını giriniz..." rows="3"></textarea>
                
                <div class="dosya-yukleme-alani">
                    <label for="baloncukDosya" class="dosya-yukleme-butonu">📎 PDF veya Resim Ekle</label>
                    <input type="file" id="baloncukDosya" accept=".pdf, image/*" class="gizli-dosya-secici">
                    
                    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-top:5px;">
                        <span id="secilenDosyaIsmi" class="secilen-dosya-ismi">Henüz dosya seçilmedi.</span>
                        <!-- YENİ: Dosya Silme İkonu (Sadece dosyası olan görevlerde çıkar) -->
                        <span id="dosyaSilBtn" class="gizli" style="cursor:pointer; font-size:16px;" onclick="mevcutDosyayiSilmeyiIsaretle()" title="Mevcut Dosyayı Sil">🗑️</span>
                    </div>
                </div>
                
                <div class="baloncuk-butonlar">
                    <button onclick="baloncuktanKaydet()" class="btn-kaydet">Kaydet</button>
                    <button onclick="baloncuguKapat()" class="btn-iptal">İptal</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
